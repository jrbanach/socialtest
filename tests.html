// ============================================================
// MINI TEST RUNNER — no dependencies, outputs to DOM
// ============================================================
let totalTests = 0, passCount = 0, failCount = 0;
const suites = [];
let currentSuite = null;

/** Begin a named test suite. */
function suite(name) {
  currentSuite = { name, tests: [] };
  suites.push(currentSuite);
}

/**
 * Run a single test assertion.
 * @param {string} name - test description
 * @param {function} fn - test function; throw or return false to fail
 */
function test(name, fn) {
  totalTests++;
  try {
    const result = fn();
    if (result === false) throw new Error('Returned false');
    passCount++;
    currentSuite.tests.push({ name, pass: true });
  } catch (e) {
    failCount++;
    currentSuite.tests.push({ name, pass: false, error: e.message });
  }
}

/** Assert that a condition is true. */
function assert(condition, msg) {
  if (!condition) throw new Error(msg || 'Assertion failed');
}

/** Assert two values are strictly equal. */
function assertEqual(actual, expected, msg) {
  if (actual !== expected) throw new Error(msg || `Expected ${expected}, got ${actual}`);
}

/** Assert value is within range [min, max]. */
function assertInRange(val, min, max, msg) {
  if (val < min || val > max) throw new Error(msg || `${val} not in range [${min}, ${max}]`);
}

// ============================================================

/**
 * Fisher-Yates shuffle — returns a new shuffled array.
 * @param {any[]} arr
 * @returns {any[]}
 */
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/**
 * Build active question indices based on quiz mode.
 * @param {object[]} jeopardyData - full question dataset
 * @param {string} mode - "random" | "all" | "vocab" | "defs"
 * @returns {number[]}
 */
function buildGameIndices(jeopardyData, mode) {
  const vocabIdx = [], mcIdx = [];
  jeopardyData.forEach((q, i) => {
    if (q.category === 'vocab') vocabIdx.push(i);
    else mcIdx.push(i);
  });
  switch (mode) {
    case 'vocab': return shuffleArray([...vocabIdx]);
    case 'defs':  return shuffleArray([...mcIdx]);
    case 'all':   return [...vocabIdx, ...mcIdx];
    case 'random':
    default:      return shuffleArray([...vocabIdx, ...mcIdx]);
  }
}

/**
 * Calculate HP parameters for a given question count.
 * @param {number} totalQuestions
 * @returns {{ maxWrong: number, heroMaxHP: number }}
 */
function calcHP(totalQuestions) {
  const maxWrong = Math.ceil(totalQuestions * 0.3);
  return { maxWrong, heroMaxHP: maxWrong };
}

function getSectionTitle(screenId) {
  switch (screenId) {
    case 'vocab': return 'Vocabulary';
    case 'mc': return 'Multiple Choice';
    case 'rockcycle': return 'Rock Cycle';
    case 'gamequiz': return 'Game Quiz';
    case 'parent-answers': return 'Parent Mode - Answers';
    case 'parent-edit': return 'Parent Mode - Edit';
    case 'parent-gamequiz': return 'Parent Mode - Game Quiz';
    case 'parent-history': return 'Parent Mode - History';
    case 'parent-quizsettings': return 'Parent Mode - Quiz Settings';
    case 'home':
    default:
      return 'Home';
  }
}

function buildDocumentTitle(quiz, screenId) {
  const base = quiz ? `${quiz.subject} - ${quiz.title}` : 'Study Quiz';
  const section = getSectionTitle(screenId);
  return section === 'Home' ? `${base} - Home` : `${base} - ${section}`;
}

/**
 * Compute heart display from current HP.
 * @param {number} heroHP - current HP (0..heroMaxHP)
 * @param {number} heroMaxHP - max HP
 * @returns {{ full: number, half: number, empty: number }} counts for 5-heart display
 */
function computeHearts(heroHP, heroMaxHP) {
  const displayMax = 10; // 5 full hearts × 2 half-hearts
  const ratio = heroHP / heroMaxHP;
  const halfHeartsRemaining = Math.round(ratio * displayMax);
  let full = 0, half = 0, empty = 0;
  for (let i = 0; i < 5; i++) {
    const idx = i * 2;
    const leftHalf = idx < halfHeartsRemaining;
    const rightHalf = (idx + 1) < halfHeartsRemaining;
    if (leftHalf && rightHalf) full++;
    else if (leftHalf) half++;
    else empty++;
  }
  return { full, half, empty };
}

/**
 * Simulate grading an answer.
 * @param {object} question - { choices, correct }
 * @param {number} selectedChoice - index selected
 * @returns {boolean} true if correct
 */
function gradeAnswer(question, selectedChoice) {
  return selectedChoice === question.correct;
}

/**
 * Sanitize string for safe HTML insertion (mirrors esc() in index.html).
 * @param {string} str
 * @returns {string}
 */
function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/\x3c/g,'&lt;').replace(/>/g,'&gt;');
}

// Reuse shuffleArray from the quiz logic
function getShuffleOrder(map, qi, numChoices) {
  if (!map[qi]) {
    const order = Array.from({ length: numChoices }, (_, i) => i);
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    map[qi] = order;
  }
  return map[qi];
}

test('getShuffleOrder returns all original indices', () => {
  const map = {};
  const order = getShuffleOrder(map, 0, 4);
  assert(order.length === 4, 'Should have 4 entries');
  assert(order.includes(0), 'Contains index 0');
  assert(order.includes(1), 'Contains index 1');
  assert(order.includes(2), 'Contains index 2');
  assert(order.includes(3), 'Contains index 3');
});

test('getShuffleOrder is stable for the same question', () => {
  const map = {};
  const first = getShuffleOrder(map, 5, 4);
  const second = getShuffleOrder(map, 5, 4);
  assert(first === second, 'Same reference returned for same qi');

});

test('getShuffleOrder gives different maps for different questions', () => {
  const map = {};
  // Generate shuffles for many questions — at least one should differ
  const orders = [];
  for (let i = 0; i < 20; i++) {
    orders.push(getShuffleOrder(map, i, 4).join(','));
  }
  const unique = new Set(orders);
  assert(unique.size > 1, 'Not all questions have identical order (would be astronomically unlikely)');
});

test('Shuffled correct answer maps back correctly', () => {
  const q = { choices: ['A', 'B', 'C', 'D'], correct: 2 };
  const map = {};
  const order = getShuffleOrder(map, 0, q.choices.length);
  // Find where original correct index (2) ended up in the shuffled order
  const displayPos = order.indexOf(q.correct);
  assert(displayPos >= 0, 'Correct answer exists in shuffled order');
  // The value at that display position should map back to original correct
  assert(order[displayPos] === q.correct, 'Mapped index matches original correct');
  // Selecting that original index should grade as correct
  const selected = order[displayPos]; // This is what the radio value would be
  assert(selected === q.correct, 'Selected value equals q.correct');
});

test('Clearing shuffle map on reset gives fresh order', () => {
  const map = {};
  const first = getShuffleOrder(map, 0, 4).slice(); // copy
  delete map[0]; // simulate reset clearing
  const second = getShuffleOrder(map, 0, 4);
  // They might be the same by chance, but the map was regenerated
  assert(Array.isArray(second), 'New order generated after clear');
  assert(second.length === 4, 'Still has 4 entries');
});

suite('Quest Engine — Stage Data Model');

// Mock buildGameIndices for testing (returns sequential indices)
function mockBuildGameIndices(mode, total) {
  const all = Array.from({ length: total }, (_, i) => i);
  return all;
}

// Local copy of stage-building logic for testing
function testBuildQuestStages(totalQuestions, mode, options = {}) {
  const maxStages = Math.min(options.maxStages || 5, 5); // 5 = ENEMY_ROSTER length
  const minPerStage = options.minPerStage || 4;
  const indices = Array.from({ length: totalQuestions }, (_, i) => i);
  const total = indices.length;
  const stageCount = Math.max(2, Math.min(maxStages, Math.floor(total / minPerStage)));
  const basePerStage = Math.floor(total / stageCount);
  const remainder = total % stageCount;

  const stages = [];
  let offset = 0;
  for (let s = 0; s < stageCount; s++) {
    const count = basePerStage + (s >= stageCount - remainder ? 1 : 0);
    stages.push({
      stageIndex: s,
      questionIndices: indices.slice(offset, offset + count),
      isBoss: s === stageCount - 1
    });
    offset += count;
  }
  return { stages, totalQuestions: total, stageCount };
}

test('37 questions produce 5 stages', () => {
  const result = testBuildQuestStages(37, 'random');
  assert(result.stageCount === 5, `Expected 5 stages, got ${result.stageCount}`);
});

test('All questions are distributed (none lost)', () => {
  const result = testBuildQuestStages(37, 'random');
  const distributed = result.stages.reduce((sum, s) => sum + s.questionIndices.length, 0);
  assert(distributed === 37, `Expected 37 distributed, got ${distributed}`);
});

test('Each stage has at least minPerStage questions', () => {
  const result = testBuildQuestStages(37, 'random');
  const allMeetMin = result.stages.every(s => s.questionIndices.length >= 4);
  assert(allMeetMin, 'All stages have at least 4 questions');
});

test('Last stage is always the boss', () => {
  const result = testBuildQuestStages(37, 'random');
  const lastStage = result.stages[result.stages.length - 1];
  assert(lastStage.isBoss === true, 'Last stage should be boss');
});

test('Non-last stages are not boss', () => {
  const result = testBuildQuestStages(37, 'random');
  const nonBoss = result.stages.slice(0, -1).every(s => s.isBoss === false);

});

test('Adventure map state: cleared vs current vs upcoming', () => {
  const stages = [
    { stageIndex: 0, isBoss: false },
    { stageIndex: 1, isBoss: false },
    { stageIndex: 2, isBoss: true }
  ];
  const current = 1;
  const phase = 'QUESTIONS';

  const states = stages.map((s, i) => {
    const isCleared = i < current || (phase === 'VICTORY' && i <= current) || (phase === 'STAGE_CLEAR' && i === current);
    const isCurrent = (i === current && phase !== 'VICTORY' && phase !== 'STAGE_CLEAR')
      || (phase === 'STAGE_CLEAR' && i === current + 1);
    return isCleared ? 'cleared' : isCurrent ? 'current' : 'upcoming';
  });
  assertEqual(states[0], 'cleared', 'Stage 0 is cleared');
  assertEqual(states[1], 'current', 'Stage 1 is current');
  assertEqual(states[2], 'upcoming', 'Stage 2 (boss) is upcoming');
});

    case 'knowledge': return { badge: '🧠 Knowledge', cls: 'knowledge', hint: 'What do you know about this? 🤔', color: '#2563eb' };
    case 'short-answer': return { badge: '✍️ Short Answer', cls: 'short-answer', hint: 'Write your answer', color: '#16a34a' };
    default: return { badge: '📝 Study', cls: 'vocab', hint: 'Write your answer', color: '#666' };
  }
}

function getStudyCompletedCount(items, answers) {
  return items.filter(item => (answers[item.id] || '').trim().length > 0).length;
}

// RENDER RESULTS TO DOM
// ============================================================
function renderResults() {
  const el = document.getElementById('results');
  let html = '';
  suites.forEach(s => {
    html += `<div class="suite"><h2>${s.name}</h2>`;
    s.tests.forEach(t => {
      html += `<div class="test ${t.pass ? 'pass' : 'fail'}">
        ${t.pass ? '✅' : '❌'} ${t.name}
        ${t.error ? `<div class="detail">Error: ${t.error}</div>` : ''}
      </div>`;
    });
    html += '</div>';
  });

  const allPass = failCount === 0;
  html += `<div class="summary ${allPass ? 'all-pass' : 'has-fail'}">
    ${allPass ? '🎉' : '⚠️'} ${passCount}/${totalTests} tests passed
    ${failCount > 0 ? ` — ${failCount} failed` : ''}
  </div>`;
  el.innerHTML = html;
}

renderResults();
